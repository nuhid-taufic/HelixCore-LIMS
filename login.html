<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelixCore - Scientist Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-box">
        <h1>HelixCore</h1>
        <p>Lab Access Portal</p>

        <form>
            <div class="input-group">
                <label>Scientist ID</label>
                <input type="text" placeholder="Enter your ID">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter secret key">
            </div>

            <button type="submit" class="login-btn">Enter Lab</button>
        </form>
    </div>

</body>

</html>
